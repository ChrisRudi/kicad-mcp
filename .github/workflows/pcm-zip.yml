# Build the KiCad PCM ("Install from File") archive and attach it to releases.
# GitHub's auto repo-zip is NOT PCM-installable (wrong layout); this produces a
# metadata.json + plugins/ + resources/ archive that KiCad's Plugin and Content
# Manager accepts. Also runnable on demand (workflow_dispatch).
name: PCM zip

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PCM archive
        run: python make_pcm_zip.py

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-kicad-pcm
          path: dist/*.zip

      - name: Attach to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber
