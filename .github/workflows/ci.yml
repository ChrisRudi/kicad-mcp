name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: pylint (no errors / no warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pylint

      - name: Run pylint (errors + warnings only)
        # The repo's pyproject.toml carries the curated disable list and
        # documents per-cluster rationale. We fail CI on anything more
        # severe than INFO — the scan_kicad_mcp.bat scoreboard.
        run: |
          pylint --rcfile=pyproject.toml --score=n \
            --disable=C,R \
            kicad_mcp tests

  tests:
    name: pytest (Linux, KiCad mocked)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Run tests (no-coverage to keep CI fast)
        # The IPC tests self-skip when KiCad / pcbnew / kicad-cli are
        # absent, which is the case in CI. The remaining tests cover
        # Phase A–S, the dynamic tool-registry walk + tool-count lock
        # (drift guard), docstring quality floor, path-normalisation
        # audit and the CLI-mocked netlist path.
        run: |
          pytest tests/ -q --no-cov --tb=short

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: |
            .pytest_cache
          retention-days: 7
