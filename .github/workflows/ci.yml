name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: pylint (no errors / no warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + lint deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pylint

      - name: Run pylint (errors + warnings only)
        # The repo's pyproject.toml carries the curated disable list and
        # documents per-cluster rationale. We fail CI on anything more
        # severe than INFO — the scan_kicad_mcp.bat scoreboard.
        run: |
          pylint --rcfile=pyproject.toml --score=n \
            --disable=C,R \
            kicad_mcp tests

      - name: Duplicate-code gate (blocks >= 10 similar lines)
        # Drift-Wächter gegen Copy-Paste zwischen Modulen (0.24.0: Bestand
        # auf 0 abgebaut — Scorer, Bus-Tabellen, Inline-Parser, Worker-
        # Boilerplate). Schwelle 10 Zeilen: das kurze, konventionsbedingte
        # Tool-Boilerplate (Konvention #1/#4) bleibt erlaubt, echte Kopien
        # nicht. Neue Gemeinsamkeiten gehören in utils/ bzw. common/.
        run: |
          pylint --rcfile=pyproject.toml --score=n \
            --disable=all --enable=duplicate-code \
            --min-similarity-lines=10 \
            kicad_mcp

  tests:
    name: pytest (Linux, KiCad mocked)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .

      - name: Run tests (no-coverage to keep CI fast)
        # The IPC tests self-skip when KiCad / pcbnew / kicad-cli are
        # absent, which is the case in CI. The remaining tests cover
        # Phase A–S, the dynamic tool-registry walk + tool-count lock
        # (drift guard), docstring quality floor, path-normalisation
        # audit and the CLI-mocked netlist path.
        run: |
          pytest tests/ -q --no-cov --tb=short

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: |
            .pytest_cache
          retention-days: 7

  tests-kicad:
    name: pytest + selftest (Linux, echtes KiCad 10)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install KiCad 10 (PPA, ohne 3D-Modelle)
        # Gleiche Route wie der Dev-Container: scripts/setup_container_kicad.sh
        # (PPA + kicad + Symbol-/Footprint-Libs). Damit laufen die ~194 sonst
        # geskippten pcbnew-Tests und die kicad-cli-Pfade (ERC/DRC) ECHT.
        run: sudo sh scripts/setup_container_kicad.sh ""

      - name: Install project (venv mit System-Site → pcbnew sichtbar)
        run: |
          python3 -m venv --system-site-packages .venv-kicad
          .venv-kicad/bin/pip install --upgrade pip
          .venv-kicad/bin/pip install -e ".[dev]" || .venv-kicad/bin/pip install -e .

      - name: Selftest (10 Schritte, echte Tools, echtes KiCad)
        run: .venv-kicad/bin/python -m kicad_mcp.selftest --out selftest-out --verbose

      - name: Run tests (inkl. pcbnew-/kicad-cli-Pfade)
        # Validiert im Dev-Container: 2881 passed mit pcbnew 10.0.4 —
        # dieser Job testet die ~80 sonst geskippten pcbnew-Pfade ECHT.
        run: .venv-kicad/bin/pytest tests/ -q --no-cov --tb=short

      - name: Upload selftest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-report
          path: selftest-out/
          retention-days: 7

  live-ipc:
    name: Live-IPC (echter pcbnew unter Xvfb — die „Mitarbeiter"-Schicht)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install KiCad 10 + GUI-Live-Zutaten (Xvfb/xdotool)
        run: sudo sh scripts/setup_container_kicad.sh ""

      - name: Install project (venv mit System-Site → kipy/pcbnew sichtbar)
        run: |
          python3 -m venv --system-site-packages .venv-kicad
          .venv-kicad/bin/pip install --upgrade pip
          .venv-kicad/bin/pip install -e ".[dev]" || .venv-kicad/bin/pip install -e .
          # kipy (kicad-python) ist nicht in dist-packages — separat holen
          .venv-kicad/bin/pip install kicad-python

      - name: Live-IPC-Tests (Selektion/Cross-Probe gegen laufenden Editor)
        env:
          KICAD_MCP_LIVE_IPC: "1"
        run: .venv-kicad/bin/pytest tests/test_live_ipc.py -q --no-cov --tb=short

  gui-smoke:
    name: GUI-Smoke (wxPython-Dialoge unter Xvfb — Linux-Render)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: KiCad + Xvfb (bringt wxPython in dist-packages für py3.12)
        run: sudo sh scripts/setup_container_kicad.sh ""

      - name: ImageMagick für Screenshots
        run: sudo apt-get install -y -qq imagemagick

      - name: Dialoge unter Xvfb rendern (jeder Dialog = ein Case)
        # wxPython liegt in KiCads dist-packages (python3.12) → System-Python.
        # Xvfb via xvfb-run; Screenshots landen als Artefakt.
        run: |
          xvfb-run -a --server-args="-screen 0 1600x1000x24" \
            /usr/bin/python3.12 scripts/gui_smoke.py --out gui-smoke-out \
            --board-cwd "$PWD"

      - name: Upload GUI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-smoke-screenshots
          path: gui-smoke-out/
          retention-days: 7
